<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Content Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>✨ Content Dashboard</h1>
      <span class="date" id="today-date"></span>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="clients">UGC Clients</button>
    <button class="tab" data-tab="checklist">Daily Checklist</button>
    <button class="tab" data-tab="groups">Facebook Groups</button>
  </nav>

  <main>
    <!-- UGC CLIENTS -->
    <section id="tab-clients" class="tab-panel active">
      <div class="panel-header">
        <h2>UGC Clients</h2>
        <button class="btn-primary" onclick="openModal('client-modal')">+ Add Client</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="delivered">Delivered</button>
        <button class="filter-btn" data-filter="paid">Paid</button>
      </div>

      <div id="clients-grid" class="clients-grid"></div>
    </section>

    <!-- DAILY CHECKLIST -->
    <section id="tab-checklist" class="tab-panel">
      <div class="panel-header">
        <h2>Daily Posting Checklist</h2>
        <div class="header-actions">
          <button class="btn-ghost" onclick="resetChecklist()">Reset for Today</button>
          <button class="btn-primary" onclick="openModal('checklist-modal')">+ Add Task</button>
        </div>
      </div>

      <div class="checklist-progress">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-label">0 / 0 done</span>
      </div>

      <ul id="checklist-list" class="checklist-list"></ul>
    </section>

    <!-- FACEBOOK GROUPS -->
    <section id="tab-groups" class="tab-panel">
      <div class="panel-header">
        <h2>Facebook Groups</h2>
        <div class="header-actions">
          <button class="btn-ghost" onclick="resetGroups()">Reset Posts for Today</button>
          <button class="btn-primary" onclick="openModal('group-modal')">+ Add Group</button>
        </div>
      </div>

      <div class="groups-progress">
        <div class="progress-bar"><div id="groups-progress-fill" class="progress-fill purple"></div></div>
        <span id="groups-progress-label">0 / 0 posted</span>
      </div>

      <div id="groups-list" class="groups-list"></div>
    </section>
  </main>

  <!-- MODAL: Add Client -->
  <div id="client-modal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'client-modal')">
    <div class="modal">
      <div class="modal-header">
        <h3 id="client-modal-title">Add Client</h3>
        <button class="close-btn" onclick="closeModal('client-modal')">✕</button>
      </div>
      <form id="client-form" onsubmit="saveClient(event)">
        <input type="hidden" id="client-id" />
        <div class="form-group">
          <label>Client Name *</label>
          <input type="text" id="client-name" required placeholder="e.g. Brand Co." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Platform</label>
            <input type="text" id="client-platform" placeholder="e.g. TikTok, Instagram" />
          </div>
          <div class="form-group">
            <label>Content Type</label>
            <input type="text" id="client-content-type" placeholder="e.g. Unboxing video" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Rate</label>
            <input type="text" id="client-rate" placeholder="e.g. $150" />
          </div>
          <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="client-due" />
          </div>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="client-status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="delivered">Delivered</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="client-notes" rows="3" placeholder="Brief notes, requirements, links..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" onclick="closeModal('client-modal')">Cancel</button>
          <button type="submit" class="btn-primary">Save Client</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Add Checklist Task -->
  <div id="checklist-modal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'checklist-modal')">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Checklist Task</h3>
        <button class="close-btn" onclick="closeModal('checklist-modal')">✕</button>
      </div>
      <form id="checklist-form" onsubmit="saveChecklistItem(event)">
        <div class="form-group">
          <label>Task Name *</label>
          <input type="text" id="checklist-task-name" required placeholder="e.g. Post to TikTok" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="checklist-category" placeholder="e.g. TikTok, Instagram, Admin" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" onclick="closeModal('checklist-modal')">Cancel</button>
          <button type="submit" class="btn-primary">Add Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: Add Facebook Group -->
  <div id="group-modal" class="modal-overlay" onclick="closeModalOnOverlay(event, 'group-modal')">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Facebook Group</h3>
        <button class="close-btn" onclick="closeModal('group-modal')">✕</button>
      </div>
      <form id="group-form" onsubmit="saveGroup(event)">
        <div class="form-group">
          <label>Group Name *</label>
          <input type="text" id="group-name" required placeholder="e.g. UGC Creators Hub" />
        </div>
        <div class="form-group">
          <label>Group Link</label>
          <input type="url" id="group-link" placeholder="https://facebook.com/groups/..." />
        </div>
        <div class="form-group">
          <label>What to Post</label>
          <input type="text" id="group-post-type" placeholder="e.g. UGC portfolio, services promo" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="group-notes" placeholder="e.g. Post Tuesdays only" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-ghost" onclick="closeModal('group-modal')">Cancel</button>
          <button type="submit" class="btn-primary">Add Group</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
